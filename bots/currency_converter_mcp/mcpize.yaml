version: 1
name: currency_converter_mcp
description: Convert currencies instantly with live rates at your fingertips!
runtime: python
entry: server.py
build:
  install: pip install -r requirements.txt
startCommand:
  type: stdio
  command: python
  args:
  - server.py
long_description: Need to convert currencies on the fly? Our Instant Currency Converter
