  it easy to integrate into your applications. Whether you're creating a TV guide
  app or researching your next binge-watch, we've got you covered.
category: utilities
categories:
- utilities
- tv
- shows
- episodes
tags:
- tv
- shows
- episodes
- search
- api
- entertainment
- media
