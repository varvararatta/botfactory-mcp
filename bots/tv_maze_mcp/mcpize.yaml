version: 1
name: tv_maze_mcp
description: Discover your favorite TV shows and episodes with ease!
runtime: python
entry: server.py
build:
  install: pip install -r requirements.txt
startCommand:
  type: stdio
  command: python
  args:
  - server.py
long_description: Unlock a world of television with the TV Maze MCP server. Effortlessly
