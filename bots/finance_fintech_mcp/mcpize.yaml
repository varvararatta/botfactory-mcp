# MCPize manifest - https://mcpize.com
version: 1
name: finance_fintech_mcp
description: Access live exchange rates and crypto prices effortlessly!
runtime: container
entry: server.py
build:
  dockerfile: Dockerfile
startCommand:
  type: http
long_description: Unlock the power of financial insights with our Finance MCP. Get
  the latest foreign exchange rates through the Frankfurter API, or dive into cryptocurrency
  prices with CoinGecko. Perfect for developers and finance enthusiasts who need accurate,
  real-time data without the hassle of authentication. Whether you're building trading
  applications or just need quick conversions, our tools are designed for seamless
  integration. Start exploring today!
category: finance
categories:
- finance
- fintech
- crypto
tags:
- finance
- fintech
- crypto
- exchange rates
- api
- data
- real-time
- currency
tools:
- name: get_exchange_rates
  description: 'Get latest foreign exchange rates for a base currency via Frankfurter
    API. Returns: {base, date, rates: {EUR: 0.92, ...}}'
- name: convert_currency
  description: 'Convert amount between currencies using live rates. Returns: {amount,
    from, to, rate, result}'
- name: get_crypto_price
  description: 'Get cryptocurrency spot price via CoinGecko (no API key). symbol:
    btc, eth, sol, etc. Returns: {symbol, id, price, currency}'
- name: health_check
  description: Server health check.
pricing:
  protocol: x402
  network: base
  recipient: '0x170b522a5e2c75AF546C57c9739Aa3583836D908'
  asset: usdc
  tools:
  - name: get_exchange_rates
    price: '0.01'
  - name: convert_currency
    price: '0.01'
  - name: get_crypto_price
    price: '0.01'
  - name: health_check
    price: '0'
