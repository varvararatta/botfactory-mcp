# MCPize manifest - https://mcpize.com
version: 1
name: crypto_prices_mcp
description: Get real-time crypto prices and trends effortlessly!
runtime: container
entry: server.py
build:
  dockerfile: Dockerfile
startCommand:
  type: http
long_description: Unlock the power of real-time cryptocurrency data with our Crypto
